---
- name: Deploy Enterprise Web Page
  hosts: web
  become: true

  tasks:

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Check nginx is running
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Deploy custom index page
      ansible.builtin.template:
        src: ../templates/index.html.j2
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: "0644"
