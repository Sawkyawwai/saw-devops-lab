---
# tasks file for roles/docker

- name: Install Docker
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true

- name: Enable Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true

- name: Start Docker
  ansible.builtin.systemd:
    name: docker
    state: started

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
